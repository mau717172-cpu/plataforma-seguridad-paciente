<div class="login-container">
  <div class="avatar">
    <mat-icon>person</mat-icon>
  </div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Perfil</mat-label>
    <mat-select [(ngModel)]="perfil">
      <mat-option [value]="'paciente'">Paciente</mat-option>
      <mat-option [value]="'medico'">Médico</mat-option>
      <mat-option [value]="'enfermero'">Enfermero</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-icon matPrefix>person</mat-icon>
    <mat-label>Usuario</mat-label>
    <input matInput type="text" [(ngModel)]="usuario">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-icon matPrefix>lock</mat-icon>
    <mat-label>Contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="contrasena">
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    class="full-width"
    (click)="ingresar()">
    Ingresar
  </button>
</div>
