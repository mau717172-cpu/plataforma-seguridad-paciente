<app-header></app-header>

<div class="dashboard-container">
  <div class="menu-grid">
    <mat-card
      *ngFor="let item of elementosMenu()"
      class="menu-card"
      [style.background-color]="item.color"
      (click)="navegarA(item.ruta)">
      <mat-card-content>
        <div class="card-content">
          <mat-icon class="card-icon">{{ item.icono }}</mat-icon>
          <p class="card-title">{{ item.titulo }}</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
