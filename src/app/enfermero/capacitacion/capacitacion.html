<div class="page-layout">
  <app-header [currentPage]="'Capacitación por simulación'" [parentPage]="'Menú Principal'"></app-header>
  <div class="content-wrapper">
    <app-sidebar></app-sidebar>
    <main class="main-content">
      <div class="page-container">
        <section class="training-content">
          <h2>Capacitación por simulación</h2>
          <div class="page-description">
            <p>Selecciona un escenario y luego elige la dificultad.</p>
          </div>

          <!-- Vista de selección de escenario y dificultad -->
          <div *ngIf="!selectedScenario" class="options-list">
            <div *ngFor="let scenario of options" class="scenario-row" [class.expanded]="scenario.expanded">
              <button class="option-card" type="button" (click)="toggle(scenario)">
                <span>{{ scenario.title }}</span>
                <mat-icon class="arrow">chevron_right</mat-icon>
              </button>
              <div class="scenario-options" *ngIf="scenario.expanded">
                <button class="option" type="button" *ngFor="let difficulty of scenario.difficulties" (click)="selectDifficulty(scenario, difficulty)">
                  {{ difficulty }}
                </button>
              </div>
            </div>
          </div>

          <!-- Vista de simulación seleccionada -->
          <div *ngIf="selectedScenario" class="simulation-view">
            <div class="simulation-header">
              <button class="back-button" type="button" (click)="goBack()">
                <mat-icon>arrow_back</mat-icon>
                Volver
              </button>
              <h3>{{ selectedScenario.title }} - {{ selectedDifficulty }}</h3>
            </div>

            <div class="video-section">
              <div class="video-input">
                <label for="patientSelect">Seleccionar Paciente</label>
                <select
                  id="patientSelect"
                  [(ngModel)]="selectedPatient"
                  class="patient-select"
                >
                  <option value="">-- Seleccionar paciente --</option>
                  <option *ngFor="let patient of patients" [value]="patient">{{ patient }}</option>
                </select>
              </div>

              <div class="video-player" *ngIf="getVideoEmbedUrl()">
                <iframe
                  [src]="getVideoEmbedUrl()"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen
                  class="video-iframe"
                ></iframe>
              </div>

              <div class="video-placeholder" *ngIf="!getVideoEmbedUrl()">
                <mat-icon class="placeholder-icon">play_circle_outline</mat-icon>
                <p>Selecciona un paciente para ver el video de capacitación</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>
